name: Release

# Builds the full cross-platform matrix and attaches the binaries to a
# GitHub Release. Triggers ONLY when a Release is published (manually
# from the GitHub UI or via `gh release create`), or when manually
# dispatched against a specific tag. Pushes to main do NOT cut releases
# — they only run ci.yml.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to build & attach binaries to (e.g. v1.1.0)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_NET_RETRY: "10"
  RUSTFLAGS: "-C debuginfo=0"

jobs:
  # ─── 1. Resolve the version once, share with every matrix job ────────────
  meta:
    runs-on: ubuntu-latest
    outputs:
      build_tag: ${{ steps.v.outputs.tag }}
    steps:
      - id: v
        shell: bash
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            tag="${{ github.event.release.tag_name }}"
          else
            tag="${{ inputs.tag }}"
          fi
          if [ -z "$tag" ]; then
            echo "::error::No tag resolved from release event or workflow_dispatch input."
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Building release for tag: $tag"

  # ─── 2. Build matrix ─────────────────────────────────────────────────────
  build:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            artifact_name: appnest-windows-x86_64
            binary: appnest.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: appnest-linux-x86_64
            binary: appnest
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: appnest-macos-arm64
            binary: appnest
          # Cross-compile the Intel Mac binary on the plentiful ARM runner.
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: appnest-macos-x86_64
            binary: appnest

    runs-on: ${{ matrix.os }}

    env:
      BUILD_TAG: ${{ needs.meta.outputs.build_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Check out exactly the tag we're releasing so the binaries match
          # the source the release page advertises.
          ref: ${{ needs.meta.outputs.build_tag }}

      - name: Stamp Cargo.toml + Cargo.lock version
        shell: bash
        run: |
          ver="${BUILD_TAG#v}"

          awk -v ver="$ver" '
            !done && /^version[[:space:]]*=/ { print "version = \"" ver "\""; done=1; next }
            { print }
          ' app/Cargo.toml > app/Cargo.toml.new
          mv app/Cargo.toml.new app/Cargo.toml

          if [ -f app/Cargo.lock ]; then
            awk -v ver="$ver" '
              /^\[\[package\]\]/ { in_pkg=1; is_appnest=0 }
              in_pkg && /^name[[:space:]]*=[[:space:]]*"appnest"/ { is_appnest=1 }
              in_pkg && is_appnest && /^version[[:space:]]*=/ {
                print "version = \"" ver "\""; is_appnest=0; in_pkg=0; next
              }
              /^$/ { in_pkg=0; is_appnest=0 }
              { print }
            ' app/Cargo.lock > app/Cargo.lock.new
            mv app/Cargo.lock.new app/Cargo.lock
          fi

          echo "Stamped version: $ver"
          grep -E '^(name|version)' app/Cargo.toml | head -n2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Configure MinGW (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          path-type: inherit
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-binutils

      - name: Put MinGW64 on PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Expose the MSYS2 MinGW64 bin dir so cargo/rustc and embed-resource
          # pick up the matching 64-bit gcc, ld, ar AND windres. Using a
          # mismatched (32-bit) windres produces a COFF object that the
          # x86_64 linker rejects with "file format not recognized".
          $mingwBin = "${env:RUNNER_TEMP}\msys64\mingw64\bin"
          if (-not (Test-Path $mingwBin)) { $mingwBin = "D:\a\_temp\msys64\mingw64\bin" }
          if (-not (Test-Path $mingwBin)) { $mingwBin = "C:\msys64\mingw64\bin" }
          Add-Content $env:GITHUB_PATH $mingwBin
          Write-Host "Using MinGW64 from: $mingwBin"
          & "$mingwBin\gcc.exe" --version
          & "$mingwBin\windres.exe" --version

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libgtk-3-dev

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app
          key: ${{ matrix.target }}
          shared-key: release-${{ matrix.target }}

      - name: Build release
        working-directory: app
        shell: bash
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          src="app/target/${{ matrix.target }}/release/${{ matrix.binary }}"
          cp "$src" "dist/${{ matrix.binary }}"
          if [[ "${{ runner.os }}" != "Windows" ]]; then
            chmod +x "dist/${{ matrix.binary }}"
            tar -C dist -czf "dist/${{ matrix.artifact_name }}.tar.gz" "${{ matrix.binary }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.binary }}
            dist/*.tar.gz
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  # ─── 3. Attach binaries to the existing Release ─────────────────────────
  publish:
    needs: [meta, build]
    runs-on: ubuntu-latest
    env:
      BUILD_TAG: ${{ needs.meta.outputs.build_tag }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p dist
          ver="${BUILD_TAG#v}"
          find artifacts -type f \( -name 'appnest' -o -name 'appnest.exe' -o -name '*.tar.gz' \) \
            -exec cp {} dist/ \;

          # Inject the version into every asset filename so it's obvious from
          # the release page which build you're downloading. The in-app
          # updater matches assets by platform suffix (see is_platform_asset
          # in server.rs), so the leading version segment is fine.
          # Windows exe → appnest-<ver>-windows-x86_64.exe
          if [ -f dist/appnest.exe ]; then
            mv dist/appnest.exe "dist/appnest-${ver}-windows-x86_64.exe"
          fi
          # Drop the raw `appnest` binary; each per-OS .tar.gz already carries it.
          if [ -f dist/appnest ]; then
            rm dist/appnest
          fi
          # *.tar.gz → prepend version: appnest-linux-x86_64.tar.gz → appnest-<ver>-linux-x86_64.tar.gz
          for f in dist/appnest-*.tar.gz; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            new="appnest-${ver}-${base#appnest-}"
            if [ "$base" != "$new" ]; then
              mv "$f" "dist/$new"
            fi
          done

          ls -la dist

      - name: Generate checksums
        shell: bash
        working-directory: dist
        run: sha256sum * > SHA256SUMS.txt

      - name: Upload binaries to the Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BUILD_TAG }}
          files: dist/*
          # Do NOT regenerate notes — the human-authored release notes
          # entered in the GitHub UI are the source of truth.
          generate_release_notes: false
          fail_on_unmatched_files: true
